name: Deploy PULSE to GitHub Pages (manual fallback only)

# Vercel is the sole automatic deploy pipeline (auto-builds + ships
# every push to main → https://pulse-psi-fawn.vercel.app). The
# push-trigger here was removed on 2026-05-17: GitHub Pages can't run
# the /api/gemini serverless proxy, so AI is dead there — auto-mirror
# deploying it just produced a redundant, AI-broken second URL and
# wasted Actions minutes. Kept as workflow_dispatch so a static build
# can still be hand-triggered if Vercel ever has an outage.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GitHub Pages is served from /Pulse/ — force absolute base so that
          # asset URLs resolve correctly. Capacitor + other targets default to
          # relative base (./) set in vite.config.ts.
          VITE_BASE: /Pulse/
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
