<?xml version="1.0" encoding="UTF-8"?>
<!--
  PULSE app icon master — v2.
  Pulse waveform (ECG-style spike) in rose accent on near-black.
  Literal interpretation of the app name, abstract enough to read as
  a modern brand mark. No letter — modern app-icon convention is
  geometric/abstract, not type-led.

  Color: COLORS.accent (#E11D48)
  Background: COLORS.bg (#050505)
  Stroke width 64 / 1024 = 6.25% → readable at 32px (2px stroke).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Canvas -->
  <rect width="1024" height="1024" fill="#050505"/>

  <!-- Subtle radial glow centered on the spike, anchors the mark -->
  <defs>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.45">
      <stop offset="0%"   stop-color="#E11D48" stop-opacity="0.12"/>
      <stop offset="55%"  stop-color="#E11D48" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E11D48" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#centerGlow)"/>

  <!-- The pulse waveform.
       Left flat baseline (x 120..380), Q-S-R-T spike cluster, right
       flat baseline (x 590..904). Centered vertically at y=512.
       Spike geometry: small Q dip (down), big R peak (up — sharp),
       sharp S dip (down — sharper), T return up to baseline.
  -->
  <path
    d="M 120 512
       L 380 512
       L 415 545
       L 450 230
       L 502 800
       L 552 430
       L 590 512
       L 904 512"
    stroke="#E11D48"
    stroke-width="64"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
