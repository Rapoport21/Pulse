<?xml version="1.0" encoding="UTF-8"?>
<!--
  PULSE app icon master — v3.
  Minimal outlined P (clean stroke, no fill) on near-black canvas, with
  a pronounced rose floor glow rising from the bottom. Same atmospheric
  rose glow used throughout the in-app design — boot screen, login,
  Pulse Radiant.

  Color tokens:
    canvas: COLORS.bg     #050505
    P:      COLORS.textPrimary #FAFAFA
    glow:   COLORS.accent #E11D48

  Stroke width 44 on 1024 canvas = 4.3% → 1.4px at the 32px favicon
  (still legible). At 180px+ the outline reads cleanly.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Canvas -->
  <rect width="1024" height="1024" fill="#050505"/>

  <!-- Rose floor glow — radial, anchored to bottom center.
       Same gradient pattern as components/design/tokens.ts → SHADOW
       and the boot screen's atmospheric layer. Strong enough to read
       at small sizes; fades fully before reaching the top of the canvas. -->
  <defs>
    <radialGradient id="floorGlow" cx="0.5" cy="1.0" r="0.78">
      <stop offset="0%"   stop-color="#E11D48" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#E11D48" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#E11D48" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#floorGlow)"/>

  <!-- Minimal P — open outline path, single uniform stroke.
       Stem on left, half-circle bowl on top-right, gap at bottom-right.
       Built as one continuous path so stroke joins are clean.
       Coordinates:
         · stem:         vertical line x=382, y=296..760
         · top of bowl:  horizontal line y=296, x=382..524
         · right curve:  half-circle radius 132, from (524,296) to (524,560)
         · bottom bowl:  horizontal line y=560, x=524..382
  -->
  <path
    d="M 382 760
       L 382 296
       L 524 296
       A 132 132 0 0 1 524 560
       L 382 560"
    stroke="#FAFAFA"
    stroke-width="44"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
