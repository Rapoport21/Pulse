<?xml version="1.0" encoding="UTF-8"?>
<!--
  PULSE app icon master — v4.
  Refinement pass over v3:
    · Miter join at stem/crossbar corner (sharp, HUD-feeling — not a soft letter)
    · Stem stroke bumped 44 → 56 (legible at the 32px favicon, ~1.75px at that size)
    · Bowl reshaped from perfect half-circle to a slightly taller ellipse
      (rx=154, ry=140) so the P reads as a designed mark, not a default letterform
    · Re-centered so visual center lands at exactly (512, 512) on the 1024 canvas

  Color tokens:
    canvas: COLORS.bg            #050505
    P:      COLORS.textPrimary   #FAFAFA
    glow:   COLORS.accent        #E11D48
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Canvas -->
  <rect width="1024" height="1024" fill="#050505"/>

  <!-- Rose floor glow — radial, anchored to bottom center.
       Same gradient pattern used in components/design/tokens.ts → SHADOW
       and the boot screen's atmospheric layer. Inner stop nudged 0.55 → 0.62
       so the glow reads at small thumbnails without washing the icon. -->
  <defs>
    <radialGradient id="floorGlow" cx="0.5" cy="1.0" r="0.78">
      <stop offset="0%"   stop-color="#E11D48" stop-opacity="0.62"/>
      <stop offset="35%"  stop-color="#E11D48" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#E11D48" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#floorGlow)"/>

  <!-- Minimal outlined P — open path, single uniform stroke.
       Visual span 354 × 596, centered on the 1024 canvas.
       Coordinates (centerline of stroke):
         · stem:         x=363,  y=242 .. 782   (540px tall)
         · crossbar:     y=242,  x=363 .. 507
         · bowl curve:   ellipse rx=154 ry=140, (507,242) → (507,522)
         · bowl bottom:  y=522,  x=507 .. 363
       Miter join → sharp top-left corner. Round caps on open stroke ends. -->
  <path
    d="M 363 782
       L 363 242
       L 507 242
       A 154 140 0 0 1 507 522
       L 363 522"
    stroke="#FAFAFA"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="miter"
    stroke-miterlimit="4"
    fill="none"
  />
</svg>
